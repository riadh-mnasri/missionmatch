<aside class="sidebar">
  <div class="sidebar__brand">
    <span class="sidebar__brand-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2.5l2.6 5.6 6.1.8-4.4 4.3 1 6.1L12 16.4l-5.3 2.9 1-6.1-4.4-4.3 6.1-.8L12 2.5z" />
      </svg>
    </span>
    <div class="sidebar__brand-text">
      <span class="sidebar__brand-name">MissionMatch</span>
      <span class="sidebar__brand-tag">Freelance sourcing</span>
    </div>
  </div>

  <nav class="sidebar__nav">
    <a routerLink="/" routerLinkActive="sidebar__link--active" [routerLinkActiveOptions]="{ exact: true }" class="sidebar__link">
      <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="8" height="8" rx="1.5" />
        <rect x="13" y="3" width="8" height="5" rx="1.5" />
        <rect x="13" y="10" width="8" height="11" rx="1.5" />
        <rect x="3" y="13" width="8" height="8" rx="1.5" />
      </svg>
      <span>Dashboard</span>
    </a>
    <a routerLink="/missions" routerLinkActive="sidebar__link--active" class="sidebar__link">
      <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="7.5" width="18" height="12" rx="2" />
        <path d="M8.5 7.5V5.8a1.8 1.8 0 0 1 1.8-1.8h3.4a1.8 1.8 0 0 1 1.8 1.8v1.7" />
        <path d="M3 12.8h18" />
      </svg>
      <span>Missions</span>
    </a>
    <a routerLink="/profile" routerLinkActive="sidebar__link--active" class="sidebar__link">
      <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="8.5" r="3.5" />
        <path d="M4.5 20c1.2-3.6 4.2-5.5 7.5-5.5s6.3 1.9 7.5 5.5" />
      </svg>
      <span>Profile</span>
    </a>
    <a routerLink="/matches" routerLinkActive="sidebar__link--active" class="sidebar__link">
      <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="8.5" />
        <circle cx="12" cy="12" r="4.5" />
        <circle cx="12" cy="12" r="0.9" fill="currentColor" stroke="none" />
      </svg>
      <span>Matches</span>
    </a>
    <a routerLink="/candidatures" routerLinkActive="sidebar__link--active" class="sidebar__link">
      <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4.5" width="18" height="15" rx="2" />
        <path d="M9 4.5v15M15 4.5v15" />
      </svg>
      <span>Pipeline</span>
    </a>
  </nav>

  <button class="sidebar__theme-toggle" type="button" (click)="toggleTheme()" aria-label="Toggle dark mode">
    @if (theme() === 'dark') {
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="4.5" />
        <path d="M12 2.5v2M12 19.5v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M2.5 12h2M19.5 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4" />
      </svg>
      <span>Light mode</span>
    } @else {
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.5 14.5a8.5 8.5 0 1 1-9-11 7 7 0 0 0 9 11z" />
      </svg>
      <span>Dark mode</span>
    }
  </button>

  <div class="sidebar__footer">
    <span class="sidebar__footer-dot"></span>
    Reference app · DDD + Hexagonal
  </div>
</aside>
