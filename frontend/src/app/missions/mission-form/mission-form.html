<form class="form" [formGroup]="form" (ngSubmit)="submit()">
  <div class="form__grid">
    <label class="field">
      <span class="field__label">Title</span>
      <input class="field__input" type="text" formControlName="title" placeholder="Kotlin backend developer" />
    </label>

    <label class="field">
      <span class="field__label">Client</span>
      <input class="field__input" type="text" formControlName="clientName" placeholder="Acme Corp" />
    </label>

    <div class="field field--wide">
      <span class="field__label">Required skills</span>
      <app-chip-input [(skills)]="skills" [submitted]="submitAttempted()" placeholder="kotlin, spring, kafka…" />
    </div>

    <label class="field">
      <span class="field__label">Daily rate (EUR)</span>
      <input class="field__input" type="number" formControlName="dailyRateAmount" min="1" />
    </label>

    <label class="field">
      <span class="field__label">Start date</span>
      <input class="field__input" type="date" formControlName="startDate" />
    </label>
  </div>

  <button class="form__submit" type="submit" [disabled]="submitting()">
    {{ submitting() ? 'Publishing…' : 'Publish mission' }}
  </button>
</form>
