services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: missionmatch
      POSTGRES_USER: missionmatch
      POSTGRES_PASSWORD: missionmatch
    ports:
      - "5442:5432"
    volumes:
      - missionmatch-postgres-data:/var/lib/postgresql/data

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    ports:
      - "9192:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9192
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: MissionMatchDevClusterId01

volumes:
  missionmatch-postgres-data:
