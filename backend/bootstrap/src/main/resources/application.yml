server:
  port: 8181

spring:
  application:
    name: missionmatch

  datasource:
    url: jdbc:postgresql://localhost:5442/missionmatch
    username: missionmatch
    password: missionmatch

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

  kafka:
    bootstrap-servers: localhost:9192
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        # Type aliases, not producers' Java class names, travel on the wire: consumers map
        # the same alias to their own local DTO, so no context depends on another's classes.
        spring.json.type.mapping: "mission-published:com.missionmatch.sourcing.domain.event.MissionPublished,mission-closed:com.missionmatch.sourcing.domain.event.MissionClosed,match-computed:com.missionmatch.matching.domain.event.MatchComputed"
    consumer:
      group-id: missionmatch
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.missionmatch.*
        spring.json.type.mapping: "mission-published:com.missionmatch.matching.infrastructure.adapter.input.messaging.MissionPublishedIntegrationEvent,profile-updated:com.missionmatch.matching.infrastructure.adapter.input.messaging.ProfileUpdatedIntegrationEvent"
